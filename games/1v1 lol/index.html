<!DOCTYPE html>
<html>
<head>
  <title>Games</title>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial;
    }

    h1 {
      padding: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 160px);
      gap: 15px;
      padding: 15px;
    }

    .game {
      cursor: pointer;
      text-align: center;
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.05);
    }

    .game img {
      width: 160px;
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
    }

    #player {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: none;
    }

    #player iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #back {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
      padding: 10px 15px;
      background: white;
      color: black;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎮 Games</h1>

<div class="grid">

  <!-- ========================= -->
  <!-- 🔥 ADD NEW GAME HERE 🔥 -->
  <!-- ========================= -->

<div class="game" onclick="play('games/1v1%20lol/index.html')">
    <img src="games/game1/thumb.png">
    <div>Game 1</div>
  </div>

  <!-- COPY THIS BLOCK ↑ FOR MORE GAMES -->
  <!-- just change: -->
  <!-- game1 → your folder -->
  <!-- Game 1 → your name -->

</div>

<div id="player">
  <div id="back" onclick="closeGame()">⬅ Back</div>
  <iframe id="gameFrame"></iframe>
</div>

<script>
function play(path) {
  document.getElementById("player").style.display = "block";
  document.getElementById("gameFrame").src = path;
}

function closeGame() {
  document.getElementById("player").style.display = "none";
  document.getElementById("gameFrame").src = "";
}
</script>

</body>
</html>
